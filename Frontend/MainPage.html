<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Announce Finder</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="Style.css"/>
</head>
<body>

  <div class="bg-grid"></div>

  <main class="main">

    <header class="hero">
      <div class="auth-bar">
        <button id="auth-btn" class="auth-btn">Sign In</button>
      </div>
      <h1 class="logo">Announce<span>Finder</span></h1>
      <p class="tagline">Find listings across the web</p>
    </header>

    <section class="search-section">
      <form class="search-form" id="search-form">
        <input
          class="search-input"
          type="text"
          id="search-input"
          placeholder="Enter a title to search for..."
          autocomplete="off"
        />
        <button class="search-btn" type="submit">Search</button>
      </form>
    </section>

    <div class="page-layout">

      <aside class="filter-sidebar" id="filter-sidebar" style="display:none">
        <div class="filter-group">
          <h3 class="filter-heading">Sort</h3>
          <select class="filter-select" id="filter-sort" onchange="onFilterChange()">
            <option value="none">Default</option>
            <option value="az">A → Z</option>
            <option value="za">Z → A</option>
            <option value="price-asc">Price: Low to High</option>
            <option value="price-desc">Price: High to Low</option>
          </select>
        </div>

        <div class="filter-group">
          <h3 class="filter-heading">Currency</h3>
          <select class="filter-select" id="filter-currency" onchange="onFilterChange()">
            <option value="none">Original</option>
            <option value="EUR">EUR</option>
            <option value="RON">RON</option>
            <option value="GBP">GBP</option>
          </select>
        </div>

        <div class="filter-group">
          <h3 class="filter-heading">Condition</h3>
          <label class="filter-checkbox">
            <input type="checkbox" class="filter-condition" value="NEW" checked onchange="onFilterChange()"/> New
          </label>
          <label class="filter-checkbox">
            <input type="checkbox" class="filter-condition" value="USED" checked onchange="onFilterChange()"/> Used
          </label>
        </div>

        <div class="filter-group">
          <h3 class="filter-heading">Platforms</h3>
          <div id="filter-platforms"></div>
        </div>
      </aside>

      <div class="results-wrapper">
        <section class="results-section" id="results-section">
          <p class="results-placeholder" id="results-placeholder">
            Enter a title above to begin your search.
          </p>
          <div class="results-meta" id="results-meta" style="display:none">
            <span id="results-count"></span>
          </div>
          <div class="results-list" id="results-list"></div>
        </section>
      </div>

    </div>

  </main>

  <footer class="footer">
    Announce Finder
  </footer>

  <script src="/filter.js"></script>
  <script src="/main.js"></script>
</body>
</html>
