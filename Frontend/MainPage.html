<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Announce Finder</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="Style.css"/>
</head>
<body>

  <div class="bg-grid"></div>

  <main class="main">

    <header class="hero">
      <h1 class="logo">Announce<span>Finder</span></h1>
      <p class="tagline">Find listings across the web</p>
    </header>

    <section class="search-section">
      <form class="search-form" id="search-form">
        <input
          class="search-input"
          type="text"
          id="search-input"
          placeholder="Enter a title to search for..."
          autocomplete="off"
        />
        <button class="search-btn" type="submit">Search</button>
      </form>
    </section>

    <section class="results-section" id="results-section">
      <p class="results-placeholder" id="results-placeholder">
        Enter a title above to begin your search.
      </p>

      <div class="results-meta" id="results-meta" style="display:none">
        <span id="results-count"></span>
        <span id="results-query"></span>
      </div>

      <div class="results-list" id="results-list"></div>
    </section>

  </main>

  <footer class="footer">
    Announce Finder &mdash; a web crawler project
  </footer>

  <script>
    const form        = document.getElementById('search-form');
const input       = document.getElementById('search-input');
const list        = document.getElementById('results-list');
const placeholder = document.getElementById('results-placeholder');
const meta        = document.getElementById('results-meta');
const countEl     = document.getElementById('results-count');
const queryEl     = document.getElementById('results-query');

form.addEventListener('submit', async e => {
    e.preventDefault();
    const query = input.value.trim();
    if (!query) return;

    countEl.textContent = 'Searching...';
    meta.style.display = 'flex';
    list.innerHTML = '';
    placeholder.style.display = 'none';

    const response = await fetch(`/search?q=${encodeURIComponent(query)}`);
    const results  = await response.json();
    renderResults(query, results);
});

function renderResults(query, results) {
    list.innerHTML = '';
    meta.style.display = 'flex';
    countEl.textContent = `${results.length} result${results.length !== 1 ? 's' : ''}`;
    queryEl.textContent = `for "${query}"`;

    if (results.length === 0) {
        list.innerHTML = '<p class="results-placeholder">No results found.</p>';
        return;
    }

    results.forEach((r, i) => {
        const card = document.createElement('div');
        card.className = 'result-card';
        card.style.animationDelay = `${i * 80}ms`;
        card.innerHTML = `
            <div class="card-info">
                ${r.image ? `<img src="${r.image}" class="card-image" alt="${r.title}" onerror="this.style.display='none'"/>` : ''}
                <div class="card-details">
                    <a href="${r.url}" class="card-title" target="_blank">${r.title}</a>
                    <div class="card-meta">
                        <span class="card-platform">${r.platform}</span>
                        <span class="card-divider">·</span>
                    </div>
                </div>
            </div>
            <div class="card-price-col">
                <p class="card-price">${r.price}</p>
                <a href="${r.url}" class="card-btn" target="_blank">View</a>
            </div>
        `;
        list.appendChild(card);
    });
}
  </script>

</body>
</html>
