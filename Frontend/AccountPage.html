<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Account — AnnounceFinder</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/Style.css"/>
  <script src="/filter.js"></script>
</head>
<body>

  <div class="bg-grid"></div>

  <main class="main">

    <header class="hero">
      <div class="auth-bar">
        <button class="auth-btn" onclick="handleLogout()">Log Out</button>
      </div>
      <a href="/" class="logo-link">
        <h1 class="logo">Announce<span>Finder</span></h1>
      </a>
    </header>

    <section class="account-section">
      <div class="account-info">
        <p class="account-label">Logged in as</p>
        <p class="account-email" id="account-email">—</p>
      </div>
    </section>

    <div class="page-layout">

      <!-- Sidebar -->
      <aside class="filter-sidebar" id="filter-sidebar" style="display:none">
        <div class="filter-group">
          <h3 class="filter-heading">Sort</h3>
          <select class="filter-select" id="filter-sort" onchange="onFilterChange()">
            <option value="none">Default</option>
            <option value="az">A → Z</option>
            <option value="za">Z → A</option>
            <option value="price-asc">Price: Low to High</option>
            <option value="price-desc">Price: High to Low</option>
          </select>
        </div>

        <div class="filter-group">
          <h3 class="filter-heading">Currency</h3>
          <select class="filter-select" id="filter-currency" onchange="onFilterChange()">
            <option value="none">Original</option>
            <option value="EUR">EUR</option>
            <option value="RON">RON</option>
            <option value="GBP">GBP</option>
          </select>
        </div>

        <div class="filter-group">
            <h3 class="filter-heading">Condition</h3>
            <label class="filter-checkbox">
                <input type="checkbox" class="filter-condition" value="NEW" checked onchange="onFilterChange()"/> New
            </label>
            <label class="filter-checkbox">
                <input type="checkbox" class="filter-condition" value="USED" checked onchange="onFilterChange()"/> Used
            </label>
        </div>

        <div class="filter-group">
          <h3 class="filter-heading">Platforms</h3>
          <div id="filter-platforms"></div>
        </div>
      </aside>

      <!-- Favorites -->
      <div class="results-wrapper">
        <section class="results-section">
          <div class="results-meta" id="results-meta" style="display:none">
            <span id="results-count"></span>
            <span id="results-query">saved listings</span>
          </div>
          <div class="results-list" id="results-list">
            <p class="results-placeholder" id="results-placeholder">Loading favorites...</p>
          </div>
        </section>
      </div>

    </div>

  </main>

  <footer class="footer">
    AnnounceFinder
  </footer>

  <script>
    const list        = document.getElementById('results-list');
    const meta        = document.getElementById('results-meta');
    const countEl     = document.getElementById('results-count');
    const placeholder = document.getElementById('results-placeholder');

    let currentListings = [];

    async function loadAccount() {
        const res  = await fetch('/me');
        const data = await res.json();
        if (!data.logged_in) {
            window.location.href = '/login';
            return;
        }
        document.getElementById('account-email').textContent = data.email;
        loadFavorites();
    }

    async function loadFavorites() {
        const res  = await fetch('/favorites/get');
        const favs = await res.json();

        currentListings = favs;
        placeholder.style.display = 'none';
        meta.style.display = 'flex';
        countEl.textContent = `${favs.length} favorite${favs.length !== 1 ? 's' : ''}`;

        if (favs.length === 0) {
            list.innerHTML = '<p class="results-placeholder">No saved favorites yet.</p>';
            return;
        }

        buildPlatformCheckboxes(favs);
        document.getElementById('filter-sidebar').style.display = 'block';
        renderListings(applyFilters(favs));
    }

    function renderListings(listings) {
        list.innerHTML = '';
        if (listings.length === 0) {
            list.innerHTML = '<p class="results-placeholder">No results match the current filters.</p>';
            return;
        }
        listings.forEach((r, i) => {
            const card = document.createElement('div');
            card.className = 'result-card';
            card.style.animationDelay = `${i * 80}ms`;
            card.innerHTML = `
                <div class="card-info">
                    ${r.image ? `<img src="${r.image}" class="card-image" alt="${r.title}"/>` : ''}
                    <div class="card-details">
                        <a href="${r.url}" class="card-title" target="_blank">${r.title}</a>
                        <div class="card-meta">
                            <span class="card-platform">${r.platform}</span>
                        </div>
                    </div>
                </div>
                <div class="card-price-col">
                    <p class="card-price">${getDisplayPrice(r.price)}</p>
                    <a href="${r.url}" class="card-btn" target="_blank">View</a>
                    <button class="card-btn remove-btn" onclick="removeFavorite(this, '${r.listing_id}')">
                        Remove
                    </button>
                </div>
            `;
            list.appendChild(card);
        });
    }

    async function removeFavorite(btn, listing_id) {
        const res  = await fetch('/favorites/remove', {
            method:  'POST',
            headers: { 'Content-Type': 'application/json' },
            body:    JSON.stringify({ listing_id })
        });
        const data = await res.json();
        if (data.success) {
            currentListings = currentListings.filter(l => l.listing_id !== listing_id);
            btn.closest('.result-card').remove();
            const current = parseInt(countEl.textContent);
            countEl.textContent = `${current - 1} favorite${current - 1 !== 1 ? 's' : ''}`;
            if (currentListings.length === 0) {
                document.getElementById('filter-sidebar').style.display = 'none';
                list.innerHTML = '<p class="results-placeholder">No saved favorites yet.</p>';
            }
        } else {
            alert(data.error);
        }
    }

    async function handleLogout() {
        await fetch('/logout', { method: 'POST' });
        window.location.href = '/';
    }

    fetchExchangeRates();
    loadAccount();
  </script>

</body>
</html>
