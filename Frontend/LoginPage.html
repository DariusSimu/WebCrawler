<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign In — AnnounceFinder</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/Style.css"/>
</head>
<body>

  <div class="bg-grid"></div>

  <main class="main">

    <header class="hero">
      <a href="/" class="logo-link">
        <h1 class="logo">Announce<span>Finder</span></h1>
      </a>
    </header>

    <div class="auth-container">

      <!-- Tab switcher -->
      <div class="auth-tabs">
        <button class="auth-tab active" id="tab-login" onclick="switchTab('login')">Sign In</button>
        <button class="auth-tab" id="tab-register" onclick="switchTab('register')">Register</button>
      </div>

      <!-- Error/success message -->
      <p class="auth-message" id="auth-message"></p>

      <!-- Login form -->
      <div id="form-login">
        <div class="auth-field">
          <label>Email</label>
          <input type="email" id="login-email" placeholder="your@email.com" autocomplete="email"/>
        </div>
        <div class="auth-field">
          <label>Password</label>
          <input type="password" id="login-password" placeholder="Password" autocomplete="current-password"/>
        </div>
        <button class="auth-submit" onclick="handleLogin()">Sign In</button>
      </div>

      <!-- Register form -->
      <div id="form-register" style="display:none">
        <div class="auth-field">
          <label>Email</label>
          <input type="email" id="register-email" placeholder="your@email.com" autocomplete="email"/>
        </div>
        <div class="auth-field">
          <label>Password</label>
          <input type="password" id="register-password" placeholder="At least 6 characters" autocomplete="new-password"/>
        </div>
        <div class="auth-field">
          <label>Confirm Password</label>
          <input type="password" id="register-confirm" placeholder="Repeat password" autocomplete="new-password"/>
        </div>
        <button class="auth-submit" onclick="handleRegister()">Create Account</button>
      </div>

    </div>

  </main>

  <footer class="footer">
    AnnounceFinder
  </footer>

  <script>
    function switchTab(tab) {
        document.getElementById('form-login').style.display    = tab === 'login'    ? 'block' : 'none';
        document.getElementById('form-register').style.display = tab === 'register' ? 'block' : 'none';
        document.getElementById('tab-login').classList.toggle('active',    tab === 'login');
        document.getElementById('tab-register').classList.toggle('active', tab === 'register');
        clearMessage();
    }

    function showMessage(msg, isError = true) {
        const el = document.getElementById('auth-message');
        el.textContent = msg;
        el.className = 'auth-message ' + (isError ? 'auth-error' : 'auth-success');
    }

    function clearMessage() {
        const el = document.getElementById('auth-message');
        el.textContent = '';
        el.className = 'auth-message';
    }

    function isValidEmail(email) {
        return /^[\w\.-]+@[\w\.-]+\.\w+$/.test(email);
    }

    async function handleLogin() {
        const email    = document.getElementById('login-email').value.trim();
        const password = document.getElementById('login-password').value;

        if (!isValidEmail(email)) { showMessage('Please enter a valid email address.'); return; }
        if (!password)            { showMessage('Please enter your password.');         return; }

        const res  = await fetch('/login', {
            method:  'POST',
            headers: { 'Content-Type': 'application/json' },
            body:    JSON.stringify({ email, password })
        });
        const data = await res.json();

        if (data.success) {
            window.location.href = '/';
        } else {
            showMessage(data.error);
        }
    }

    async function handleRegister() {
        const email    = document.getElementById('register-email').value.trim();
        const password = document.getElementById('register-password').value;
        const confirm  = document.getElementById('register-confirm').value;

        if (!isValidEmail(email))      { showMessage('Please enter a valid email address.');        return; }
        if (password.length < 6)       { showMessage('Password must be at least 6 characters.');   return; }
        if (password !== confirm)      { showMessage('Passwords do not match.');                    return; }

        const res  = await fetch('/register', {
            method:  'POST',
            headers: { 'Content-Type': 'application/json' },
            body:    JSON.stringify({ email, password })
        });
        const data = await res.json();

        if (data.success) {
            showMessage('Account created! Redirecting...', false);
            setTimeout(() => window.location.href = '/', 1000);
        } else {
            showMessage(data.error);
        }
    }

    // Allow Enter key to submit
    document.addEventListener('keydown', e => {
        if (e.key !== 'Enter') return;
        const activeTab = document.getElementById('tab-login').classList.contains('active');
        if (activeTab) handleLogin();
        else handleRegister();
    });
  </script>

</body>
</html>
